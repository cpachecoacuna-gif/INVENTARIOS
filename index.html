  :root {

    --text: #1a1a18;
    --text-muted: #7a7870;
    --accent: #1a1a18;
    --ok: #1a6641;
    --ok-bg: #e6f4ed;
    --warn: #7a4a00;
    --warn-bg: #fef3e0;
    --danger: #8b1a1a;
    --danger-bg: #fdeaea;
    --critical: #5a0a0a;
    --critical-bg: #f8d7d7;
    --pend: #4a4a48;
    --pend-bg: #ebebeb;
    --font: 'DM Sans', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header { background: var(--accent); color: #fff; padding: 16px; position: sticky; top: 0; z-index: 50; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .header p { font-size: 11px; opacity: 0.65; margin-top: 2px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }
  .sync-dot.off { background: #f87171; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sync-label { font-size: 11px; opacity: 0.8; display: flex; align-items: center; gap: 4px; }

  /* TABS */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 72px; z-index: 40; }
  .tab { flex: 1; padding: 11px 4px; font-size: 12px; font-weight: 500; text-align: center; cursor: pointer; color: var(--text-muted); border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* SEARCH + EXPORT */
  .toolbar { padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; position: sticky; top: 113px; z-index: 39; }
  .toolbar input { flex: 1; padding: 8px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--font); }
  .toolbar input:focus { outline: none; border-color: var(--accent); }
  .btn-export { padding: 8px 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: var(--font); }

  /* STATS */
  .stats { display: flex; gap: 8px; padding: 10px 12px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; background: var(--surface); border-radius: 8px; padding: 8px; text-align: center; border: 1px solid var(--border); }
  .stat-n { font-size: 18px; font-weight: 700; }
  .stat-l { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .n-ok { color: var(--ok); }
  .n-diff { color: var(--danger); }

  /* LIST */
  .list { padding-bottom: 40px; }
  .section-head { padding: 8px 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); background: var(--bg); border-bottom: 1px solid var(--border); }
  .item { display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: var(--surface); border-bottom: 1px solid var(--border); cursor: pointer; active:background: var(--bg); transition: background 0.1s; }
  .item:active { background: var(--bg); }
  .item-left { flex: 1; min-width: 0; }
  .item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .item-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .b-pend { background: var(--pend-bg); color: var(--pend); }
  .b-ok { background: var(--ok-bg); color: var(--ok); }
  .b-warn { background: var(--warn-bg); color: var(--warn); }
  .b-danger { background: var(--danger-bg); color: var(--danger); }
  .b-critical { background: var(--critical-bg); color: var(--critical); font-size: 12px; }

  /* DIFF TABLE */
  .diff-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); }
  .diff-sev { width: 6px; flex-shrink: 0; }
  .diff-sev.c1 { background: #fbbf24; }
  .diff-sev.c2 { background: #f97316; }
  .diff-sev.c3 { background: #ef4444; }
  .diff-sev.c4 { background: #7f1d1d; }
  .diff-content { flex: 1; padding: 10px 12px; background: var(--surface); display: flex; align-items: center; gap: 10px; min-width: 0; }
  .diff-badge { font-size: 13px; font-weight: 800; padding: 4px 10px; border-radius: 6px; flex-shrink: 0; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 0 0 40px; width: 100%; max-height: 92vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 16px; }
  .modal-head { padding: 0 16px 16px; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .modal-code { font-size: 11px; color: var(--text-muted); }
  .modal-body { padding: 16px; }
  .field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; }
  .ref-box { background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-bottom: 16px; font-size: 22px; font-weight: 700; color: var(--text); }
  .ref-box span { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-left: 6px; }

  /* COUNT ROW */
  .count-row { display: flex; align-items: center; gap: 0; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .count-btn { width: 52px; height: 52px; font-size: 24px; font-weight: 300; border: none; background: var(--bg); cursor: pointer; color: var(--text); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .count-btn:active { background: var(--border); }
  .count-val { flex: 1; text-align: center; font-size: 30px; font-weight: 700; color: var(--text); border-left: 1px solid var(--border); border-right: 1px solid var(--border); padding: 8px 0; }

  /* INPUTS */
  .field-input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--font); margin-bottom: 14px; }
  .field-input:focus { outline: none; border-color: var(--accent); }
  textarea.field-input { min-height: 64px; resize: none; }
  .btn-save { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: var(--font); margin-top: 4px; }
  .btn-save:active { opacity: 0.85; }

  /* EMPTY */
  .empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 14px; }

  /* LEGEND */
  .legend { display: flex; gap: 8px; padding: 10px 12px; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>

</div>

const ALL = [...MED, ...INS];
let counts = {};
let tab = 'med';
let activeItem = null;
let fbConnected = false;

// ─── FIREBASE SYNC ───────────────────────────────────────────────────────────
function fbUrl(path){ return FIREBASE_URL + '/' + path + '.json'; }

async function fbGet(){
  try {
    const r = await fetch(FIREBASE_URL + '.json');
    const d = await r.json();
    counts = d || {};
    setSync(true);
    renderList();
  } catch(e){ setSync(false); }
}

async function fbSet(id, val){
  try {
    await fetch(fbUrl(id), { method:'PUT', body: JSON.stringify(val) });
    setSync(true);
  } catch(e){ setSync(false); }
}

function setSync(ok){
  fbConnected = ok;
  document.getElementById('sync-dot').className = 'sync-dot' + (ok?'':' off');
  document.getElementById('sync-label').textContent = ok ? 'Sincronizado' : 'Sin conexión';
}

// Poll each 4 seconds for real-time feel
setInterval(fbGet, 4000);
fbGet();

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getDiff(item){
  const c = counts[item.id];
  if(!c && c !== 0) return null;
  return (c.count !== undefined ? c.count : null);
}

function severity(diff){
  const a = Math.abs(diff);
  if(a === 0) return 0;
  if(a <= 5) return 1;
  if(a <= 15) return 2;
  if(a <= 50) return 3;
  return 4;
}

function sevClass(s){ return ['','c1','c2','c3','c4'][s]; }
function sevBadge(s){ return ['b-ok','b-warn','b-warn','b-danger','b-critical'][s]; }
function sevLabel(s){ return ['OK','Leve','Moderado','Alto ⚠','Crítico 🚨'][s]; }

function getBadge(item){
  const c = counts[item.id];
  if(!c) return {cls:'b-pend', txt:'Pendiente'};
  const d = c.count - item.sap;
  if(d === 0) return {cls:'b-ok', txt:'OK ✓'};
  const s = severity(d);
  const sign = d > 0 ? '+' : '';
  return {cls: sevBadge(s), txt: sign + d + ' · ' + sevLabel(s)};
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderList(){
  const q = document.getElementById('search').value.toLowerCase();
  let items;

  if(tab === 'dif'){
    document.getElementById('legend').style.removeProperty('display');
    items = ALL.filter(i => counts[i.id] && counts[i.id].count !== i.sap);
    items.sort((a,b) => Math.abs(counts[b.id].count - b.sap) - Math.abs(counts[a.id].count - a.sap));
  } else {
    document.getElementById('legend').style.setProperty('display','none','important');
    items = tab === 'med' ? MED : INS;
  }

  if(q) items = items.filter(i => i.n.toLowerCase().includes(q) || i.id.includes(q));

  document.getElementById('s-total').textContent = items.length;
  document.getElementById('s-ok').textContent = items.filter(i => counts[i.id] !== undefined).length;
  document.getElementById('s-diff').textContent = items.filter(i => counts[i.id] && counts[i.id].count !== i.sap).length;

  if(tab === 'dif' && items.length === 0){
    document.getElementById('list').innerHTML = '<div class="empty">Sin diferencias registradas aún.<br>Vuelve aquí mientras avanza el conteo.</div>';
    return;
  }

  if(tab === 'dif'){
    document.getElementById('list').innerHTML = items.map(item => {
      const c = counts[item.id];
      const d = c.count - item.sap;
      const s = severity(d);
      const sign = d > 0 ? '+' : '';
      const diffColor = ['#16a34a','#d97706','#ea580c','#dc2626','#7f1d1d'][s];
      return `<div class="diff-row">
        <div class="diff-sev ${sevClass(s)}"></div>
        <div class="diff-content">
          <div class="item-left">
            <div class="item-name">${item.n}</div>
            <div class="item-sub">SAP: ${item.sap} · Real: ${c.count} · ${item.t}${c.lote?' · Lote: '+c.lote:''}</div>
            ${c.obs?`<div class="item-sub" style="color:#666;margin-top:2px">${c.obs}</div>`:''}
          </div>
          <div class="diff-badge" style="background:${diffColor}22;color:${diffColor}">${sign}${d}</div>
        </div>
      </div>`;
    }).join('');
    return;
  }

  document.getElementById('list').innerHTML = items.map(item => {
    const b = getBadge(item);
    const c = counts[item.id];
    const sub = `Código: ${item.id} · SAP: ${item.sap}${c&&c.lote?' · L:'+c.lote:''}`;
    return `<div class="item" onclick="openModal('${item.id}')">
      <div class="item-left">
        <div class="item-name">${item.n}</div>
        <div class="item-sub">${sub}</div>
      </div>
      <span class="badge ${b.cls}">${b.txt}</span>
    </div>`;
  }).join('') || '<div class="empty">Sin resultados</div>';
}

function switchTab(t){
  tab = t;
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active',['med','ins','dif'][i]===t));
  document.getElementById('search').value = '';
  renderList();
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id){
  const item = ALL.find(i => i.id === id);
  if(!item) return;
  activeItem = item;
  const c = counts[id];
  document.getElementById('m-name').textContent = item.n;
  document.getElementById('m-code').textContent = `Código: ${id} · ${item.t}`;
  document.getElementById('m-ref').innerHTML = `${item.sap} <span>unidades en SAP</span>`;
  document.getElementById('m-count').textContent = c !== undefined ? c.count : item.sap;
  document.getElementById('m-lote').value = c && c.lote ? c.lote : '';
  document.getElementById('m-venc').value = c && c.venc ? c.venc : '';
  document.getElementById('m-obs').value = c && c.obs ? c.obs : '';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  activeItem = null;
}

function chg(d){
  const el = document.getElementById('m-count');
  el.textContent = Math.max(0, parseInt(el.textContent || 0) + d);
}

async function saveItem(){
  if(!activeItem) return;
  const val = {
    count: parseInt(document.getElementById('m-count').textContent),
    lote: document.getElementById('m-lote').value.trim(),
    venc: document.getElementById('m-venc').value.trim(),
    obs: document.getElementById('m-obs').value.trim(),
    ts: new Date().toISOString()
  };
  counts[activeItem.id] = val;
  closeModal();
  renderList();
  await fbSet(activeItem.id, val);
}

document.getElementById('modal').addEventListener('click', e => { if(e.target === document.getElementById('modal')) closeModal(); });

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportExcel(){
  const toRows = items => items.map(item => {
    const c = counts[item.id];
    const contado = c !== undefined ? c.count : '';
    const diff = c !== undefined ? c.count - item.sap : '';
    const s = c !== undefined && diff !== '' ? severity(diff) : '';
    return {
      'Código': item.id,
      'Descripción': item.n,
      'Tipo': item.t,
      'Stock SAP': item.sap,
      'Conteo real': contado,
      'Diferencia': diff,
      'Criticidad': s !== '' ? sevLabel(s) : '',
      'Lote/Serie': c && c.lote ? c.lote : '',
      'Vencimiento': c && c.venc ? c.venc : '',
      'Observación': c && c.obs ? c.obs : '',
      'Estado': c === undefined ? 'Pendiente' : diff === 0 ? 'OK' : diff > 0 ? 'Sobrante' : 'Faltante'
    };
  });

  const wb = XLSX.utils.book_new();
  const cols = [{wch:10},{wch:42},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:18},{wch:14},{wch:30},{wch:10}];

  const wsMed = XLSX.utils.json_to_sheet(toRows(MED));
  wsMed['!cols'] = cols;
  XLSX.utils.book_append_sheet(wb, wsMed, 'Medicamentos');

  const wsIns = XLSX.utils.json_to_sheet(toRows(INS));
  wsIns['!cols'] = cols;
  XLSX.utils.book_append_sheet(wb, wsIns, 'Insumos');

  const diffs = ALL.filter(i => counts[i.id] && counts[i.id].count !== i.sap);
  diffs.sort((a,b) => Math.abs(counts[b.id].count-b.sap) - Math.abs(counts[a.id].count-a.sap));
  const wsDif = XLSX.utils.json_to_sheet(toRows(diffs));
  wsDif['!cols'] = cols;
  XLSX.utils.book_append_sheet(wb, wsDif, 'Solo diferencias');

  XLSX.writeFile(wb, 'Inventario_ACHS_Laja_Mayo_2026.xlsx');
}
