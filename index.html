.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;animation:pulse 2s infinite}
.dot.off{background:#f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:68px;z-index:40}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--font)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.toolbar{padding:9px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;position:sticky;top:108px;z-index:39}
.toolbar input{flex:1;padding:8px 11px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:var(--font)}
.toolbar input:focus{outline:none;border-color:var(--accent)}
.btn{padding:8px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--font)}

.ok-n{color:var(--ok)}.diff-n{color:var(--alto)}
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.legdot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.list{padding-bottom:48px}
.item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer}
.item:active{background:var(--bg)}
.il{flex:1;min-width:0}
.iname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.isub{font-size:11px;color:var(--muted);margin-top:2px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.b-pend{background:var(--pend-bg);color:var(--pend)}
.b-ok{background:var(--ok-bg);color:var(--ok)}
.b-leve{background:var(--leve-bg);color:var(--leve)}
.b-mod{background:var(--mod-bg);color:var(--mod)}
.b-alto{background:var(--alto-bg);color:var(--alto)}
.b-crit{background:var(--crit-bg);color:var(--crit)}
.diff-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border)}
.dbar{width:5px;flex-shrink:0}
.d1{background:#facc15}.d2{background:#f97316}.d3{background:#ef4444}.d4{background:#7f1d1d}

.mhead{padding:0 16px 14px;border-bottom:1px solid var(--border)}

.mcode{font-size:11px;color:var(--muted)}

</div>

const ALL = [...MED,...INS];
let counts = {}, tab = 'med', active = null;

// ── FIREBASE ──────────────────────────────────────────────
let localOnly = {}; // items saved locally, waiting firebase confirm

async function fbFetch(){
  try{
    const r = await fetch(FB+'.json');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    if(d && typeof d === 'object'){
      // Merge: firebase wins except for locally-pending saves
      Object.keys(d).forEach(k=>{ if(!localOnly[k]) counts[k]=d[k]; });
      // Add any keys not in local counts
    }
    setSync(true); render();
  }catch(e){ setSync(false); }
}

async function fbSave(id, val){
  localOnly[id] = true;
  counts[id] = val;
  try{
    const r = await fetch(FB+'/'+id+'.json',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(val)
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    setSync(true);
  }catch(e){
    setSync(false);
    // Keep local data, retry on next poll
  } finally {
    delete localOnly[id];
  }
}

function setSync(ok){
  document.getElementById('dot').className='dot'+(ok?'':' off');
  document.getElementById('synctxt').textContent=ok?'Sincronizado':'Sin conexión';
}
setInterval(fbFetch, 5000); fbFetch();

// ── HELPERS ───────────────────────────────────────────────
function sev(d){const a=Math.abs(d);if(a===0)return 0;if(a<=5)return 1;if(a<=15)return 2;if(a<=50)return 3;return 4;}
const SEV_CLS=['b-ok','b-leve','b-mod','b-alto','b-crit'];
const SEV_LBL=['OK ✓','Leve','Moderado','Alto ⚠','Crítico 🚨'];
const BAR_CLS=['','d1','d2','d3','d4'];
const BAR_COL=['#16a34a','#ca8a04','#ea580c','#dc2626','#7f1d1d'];

function badge(item){
  const c=counts[item.id];
  if(!c)return{cls:'b-pend',txt:'Pendiente'};
  const d=c.count-item.sap;
  const s=sev(d);
  return{cls:SEV_CLS[s],txt:(d>0?'+':'')+d+(s?' · '+SEV_LBL[s]:'')};
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let items;
  const leg=document.getElementById('legend');

  if(tab==='dif'){
    leg.style.display='flex';
    items=ALL.filter(i=>counts[i.id]&&counts[i.id].count!==i.sap);
    items.sort((a,b)=>Math.abs(counts[b.id].count-b.sap)-Math.abs(counts[a.id].count-a.sap));
  }else{
    leg.style.display='none';
    items=tab==='med'?MED:INS;
  }
  if(q)items=items.filter(i=>i.n.toLowerCase().includes(q)||i.id.includes(q));

  document.getElementById('st').textContent=items.length;
  document.getElementById('sok').textContent=items.filter(i=>counts[i.id]).length;
  document.getElementById('sdif').textContent=items.filter(i=>counts[i.id]&&counts[i.id].count!==i.sap).length;

  if(tab==='dif'){
    if(!items.length){document.getElementById('list').innerHTML='<div class="empty">Sin diferencias aún.<br>Aparecerán aquí en tiempo real.</div>';return;}
    document.getElementById('list').innerHTML=items.map(item=>{
      const c=counts[item.id];const d=c.count-item.sap;const s=sev(d);
      const col=BAR_COL[s];const sign=d>0?'+':'';
      return`<div class="diff-row">
        <div class="dbar ${BAR_CLS[s]}"></div>
        <div class="dcontent" onclick="openModal('${item.id}')">
          <div class="il">
            <div class="iname">${item.n}</div>
            <div class="isub">SAP: ${item.sap} · Real: ${c.count} · ${item.t}${c.lote?' · L:'+c.lote:''}</div>
            ${c.obs?'<div class="isub" style="color:#888;margin-top:1px">'+c.obs+'</div>':''}
          </div>
          <div class="dbadge" style="background:${col}22;color:${col}">${sign}${d}</div>
        </div>
      </div>`;
    }).join('');
    return;
  }

  document.getElementById('list').innerHTML=items.map(item=>{
    const b=badge(item);
    const c=counts[item.id];
    return`<div class="item" onclick="openModal('${item.id}')">
      <div class="il">
        <div class="iname">${item.n}</div>
        <div class="isub">Cód: ${item.id} · SAP: ${item.sap}${c&&c.lote?' · L:'+c.lote:''}</div>
      </div>
      <span class="badge ${b.cls}">${b.txt}</span>
    </div>`;
  }).join('')||'<div class="empty">Sin resultados</div>';
}

function sw(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['med','ins','dif'][i]===t));
  document.getElementById('search').value='';
  render();
}

// ── MODAL ─────────────────────────────────────────────────
function openModal(id){
  const item=ALL.find(i=>i.id===id);if(!item)return;
  active=item;
  const c=counts[id];
  document.getElementById('mtitle').textContent=item.n;
  document.getElementById('mcode').textContent='Código: '+id+' · '+item.t;
  document.getElementById('mref').textContent=item.sap+' unidades en SAP';
  document.getElementById('mlotes').textContent=item.lotes?'Lotes SAP: '+item.lotes:'';
  document.getElementById("mcnt").value=c?c.count:item.sap;
  document.getElementById('mlote').value=c&&c.lote?c.lote:(item.lotes&&item.lotes.indexOf('/')<0?item.lotes:'');
  document.getElementById('lotehint').textContent=item.lotes&&item.lotes.indexOf('/')>-1?'Múltiples lotes: '+item.lotes:'';
  document.getElementById('mvenc').value=c&&c.venc?c.venc:'';
  document.getElementById('mobs').value=c&&c.obs?c.obs:'';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');active=null;}
function chg(d){const el=document.getElementById('mcnt');el.value=Math.max(0,parseInt(el.value||0)+d);}
async function save(){
  if(!active)return;
  const val={count:parseInt(document.getElementById("mcnt").value)||0,lote:document.getElementById('mlote').value.trim(),venc:document.getElementById('mvenc').value.trim(),obs:document.getElementById('mobs').value.trim(),ts:new Date().toISOString()};
  closeModal(); await fbSave(active.id, val); render();
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

// ── EXPORT ────────────────────────────────────────────────
function exportXLS(){
  const rows=items=>items.map(item=>{
    const c=counts[item.id];
    const contado=c!==undefined?c.count:'';
    const diff=c!==undefined?c.count-item.sap:'';
    const s=diff!==''?sev(diff):'';
    return{'Código':item.id,'Descripción':item.n,'Tipo':item.t,'Stock SAP':item.sap,'Conteo real':contado,'Diferencia':diff,'Criticidad':s!==''?SEV_LBL[s]:'','Lote/Serie':c&&c.lote?c.lote:'','Vencimiento':c&&c.venc?c.venc:'','Observación':c&&c.obs?c.obs:'','Estado':c===undefined?'Pendiente':diff===0?'OK':diff>0?'Sobrante':'Faltante'};
  });
  const cols=[{wch:10},{wch:44},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:20},{wch:14},{wch:32},{wch:10}];
  const wb=XLSX.utils.book_new();
  const wm=XLSX.utils.json_to_sheet(rows(MED));wm['!cols']=cols;XLSX.utils.book_append_sheet(wb,wm,'Medicamentos');
  const wi=XLSX.utils.json_to_sheet(rows(INS));wi['!cols']=cols;XLSX.utils.book_append_sheet(wb,wi,'Insumos');
  const diffs=ALL.filter(i=>counts[i.id]&&counts[i.id].count!==i.sap).sort((a,b)=>Math.abs(counts[b.id].count-b.sap)-Math.abs(counts[a.id].count-a.sap));
  const wd=XLSX.utils.json_to_sheet(rows(diffs));wd['!cols']=cols;XLSX.utils.book_append_sheet(wb,wd,'Solo diferencias');
  XLSX.writeFile(wb,'Inventario_ACHS_Laja_Mayo_2026.xlsx');
}
render();
</script>
